<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Clínica</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<div class="login-box">
<h2>🏥 Sistema Clínico</h2>

<div class="tabs auth-tabs">
  <button class="tab-btn active" onclick="switchTab('login-form')">Iniciar Sesión</button>
  <button class="tab-btn" onclick="switchTab('register-form')">Registrarse</button>
</div>

<!-- LOGIN TAB -->
<div id="login-form" class="tab-content active">
  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="iniciarSesion()">Ingresar</button>
</div>

<!-- REGISTER TAB -->
<div id="register-form" class="tab-content" style="display: none;">
  <input type="text" id="nombre-reg" placeholder="Nombre completo">
  <input type="email" id="email-reg" placeholder="Correo">
  <input type="password" id="password-reg" placeholder="Contraseña">
  <select id="rol-reg">
    <option value="recepcionista">Recepcionista</option>
    <option value="doctor">Doctor</option>
    <option value="admin">Admin</option>
  </select>
  <button onclick="registrarse()">Crear Cuenta</button>
</div>

<p id="mensaje"></p>
</div>

<script src="services/authService.js"></script>
<script src="utils/auth.js"></script>
<script>
  // Verificar si ya está autenticado
  window.addEventListener('DOMContentLoaded', () => {
    checkAuthLogin();
  });

  function switchTab(tabName) {
    // Hide all tabs
    document.querySelectorAll('.tab-content').forEach(tab => {
      tab.style.display = 'none';
    });
    
    // Show selected tab
    document.getElementById(tabName).style.display = 'block';
    
    // Update tab buttons
    document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
      if ((idx === 0 && tabName === 'login-form') || (idx === 1 && tabName === 'register-form')) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
  }

  async function iniciarSesion() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showAlert('Complete todos los campos', 'error');
      return;
    }

    const resultado = await authService.login(email, password);

    if (resultado.success) {
      showAlert('Bienvenido ' + resultado.usuario.nombre, 'success');
      setTimeout(() => {
        if (resultado.usuario.rol === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      }, 500);
    } else {
      showAlert(resultado.error, 'error');
    }
  }

  async function registrarse() {
    const nombre = document.getElementById('nombre-reg').value;
    const email = document.getElementById('email-reg').value;
    const password = document.getElementById('password-reg').value;
    const rol = document.getElementById('rol-reg').value;

    if (!nombre || !email || !password) {
      showAlert('Complete todos los campos', 'error');
      return;
    }

    try {
      const res = await fetch('http://localhost:3000/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, email, password, rol })
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert(data.error || 'Error al registrarse', 'error');
        return;
      }

      showAlert('Cuenta creada exitosamente. Ahora inicia sesión.', 'success');
      // Clear form
      document.getElementById('nombre-reg').value = '';
      document.getElementById('email-reg').value = '';
      document.getElementById('password-reg').value = '';
      // Switch to login
      switchTab('login-form');
    } catch (error) {
      showAlert('Error conectando con el servidor', 'error');
    }
  }
</script>
</body>
</html>
